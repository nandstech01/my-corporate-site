name: Slack Bot Cron Jobs

on:
  schedule:
    # NOTE: LinkedIn jobs moved to linkedin-cron.yml, high-freq jobs moved to high-freq-cron.yml
    - cron: '0 0 * * *'      # JST 9:00 daily suggestion
    - cron: '0 1 * * 1'      # JST 10:00 Monday weekly report
    - cron: '0 2 * * *'      # JST 11:00 trending collector (3x/day)
    - cron: '0 7 * * *'      # JST 16:00 trending collector (3x/day)
    - cron: '0 14 * * *'     # JST 23:00 trending collector (3x/day)
    - cron: '0 15 * * *'     # JST 00:00 LinkedIn engagement learner
    - cron: '0 16 * * *'     # JST 01:00 X engagement learner
    - cron: '0 18 * * *'     # JST 03:00 LinkedIn ML model retrainer
    - cron: '30 18 * * *'     # JST 03:30 X ML model retrainer
    - cron: '30 15 * * *'     # JST 00:30 Instagram engagement learner
    - cron: '0 3 * * *'       # JST 12:00 Instagram story auto-check
    - cron: '0 4,10,20 * * *'  # JST 13,19,5 Blog RSS monitor
    - cron: '30 21,3,9 * * *'  # JST 6:30,12:30,18:30 X auto-post (1日3回)
    - cron: '0 17 * * *'     # JST 02:00 AI Judge calibrator
    - cron: '0 19 * * 0'     # JST 04:00 Sunday drift monitor
    - cron: '0 19 * * 3'              # JST 04:00 Wednesday cross-platform learner
    - cron: '0 21,3,9 * * *'  # JST 6:00,12:00,18:00 buzz collector (1日3回)
    - cron: '30 3,9,15,21 * * *'  # JST 12:30,18:30,0:30,6:30 safety event scanner (6h)
    - cron: '30 0,6,12,18 * * *'  # Every 6 hours for email sequences
    - cron: '15 0-14 * * *'      # JST 9-23時 毎時15分 X account monitor
    - cron: '0 3,8,11 * * *'    # JST 12,17,20時 X conversation builder
    - cron: '0 20 * * *'        # JST 翌5時 X growth tracker
    - cron: '30 23,4,10 * * *'    # JST 8:30, 13:00, 19:00 Threads auto-post (3x/day)
    - cron: '30 16 * * *'     # JST 01:30 Threads engagement learner
    - cron: '0 22,10 * * *'           # JST 7:00, 19:00 X engagement collector
    - cron: '0 12 * * *'              # JST 21:00 Viral repost (daily, evening golden hour)
    - cron: '0 13 * * *'              # JST 22:00 Cross-post engagement collector (daily)
    - cron: '0 23 * * *'              # JST 8:00 Daily buzz global AI news
    - cron: '30 4 * * *'              # JST 13:30 Daily buzz Claude Code (shifted from 0 4 to avoid blog-rss collision)
    - cron: '0 11 * * *'              # JST 20:00 Daily buzz AI tech Japan
    - cron: '0 22 * * 0,2,4,6'        # JST 7:00 Mon,Wed,Fri,Sun Instagram carousel auto-post
    - cron: '0 22 * * 1,3,5'          # JST 7:00 Tue,Thu,Sat Instagram hybrid carousel auto-post
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - daily-suggestion
          - weekly-report
          - engagement-learner
          - linkedin-engagement-learner
          - trending-collector
          - linkedin-source-collector
          - linkedin-auto-post
          - linkedin-model-retrainer
          - instagram-engagement-learner
          - instagram-story-auto-check
          - blog-rss-monitor
          - x-auto-post
          - ai-judge-calibrator
          - buzz-collector
          - ai-judge-drift-monitor
          - safety-event-scanner
          - cross-platform-learner
          - lead-email-sequences
          - x-account-monitor
          - x-conversation-builder
          - x-growth-tracker
          - threads-auto-post
          - threads-engagement-learner
          - x-proactive-discussion
          - x-engagement-collector
          - x-model-retrainer
          - viral-repost
          - cross-post-engagement-collector
          - daily-buzz-global
          - daily-buzz-claude-code
          - daily-buzz-japan
          - anthropic-tweet-reactor
          - viral-ai-repost
          - viral-threads-repost
          - instagram-carousel-auto-post
          - instagram-hybrid-carousel-auto-post

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium (for X scraping)
        run: npx playwright install chromium --with-deps
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            services/linkedin-ml/requirements.txt
            services/x-ml/requirements.txt
      - name: Install & verify Python ML dependencies
        run: |
          pip install -r services/linkedin-ml/requirements.txt -r services/x-ml/requirements.txt
          python3 -c "import xgboost, sklearn, fugashi; print('ML dependencies OK')"
      - run: npx tsx scripts/slack-bot-cron.ts
        env:
          CRON_JOB: ${{ github.event.inputs.job || 'auto' }}
          CRON_SCHEDULE: ${{ github.event.schedule || '' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_ALLOWED_USER_IDS: ${{ secrets.SLACK_ALLOWED_USER_IDS }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          SLACK_GENERAL_CHANNEL_ID: ${{ secrets.SLACK_GENERAL_CHANNEL_ID }}
          AI_JUDGE_ENABLED: ${{ secrets.AI_JUDGE_ENABLED }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          X_PLAYWRIGHT_SESSION: ${{ secrets.X_PLAYWRIGHT_SESSION }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_TOKEN_EXPIRES_AT: ${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_TOKEN_EXPIRES_AT: ${{ secrets.INSTAGRAM_TOKEN_EXPIRES_AT }}
          INSTAGRAM_POSTING_ENABLED: ${{ secrets.INSTAGRAM_POSTING_ENABLED }}
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN_EXPIRES_AT: ${{ secrets.THREADS_TOKEN_EXPIRES_AT }}
          THREADS_POSTING_ENABLED: ${{ secrets.THREADS_POSTING_ENABLED }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          LANGCHAIN_PROJECT: nands-sns-pipeline

