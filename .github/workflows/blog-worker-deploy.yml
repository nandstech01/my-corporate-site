name: Deploy Blog Worker
on:
  push:
    paths: ['services/blog-worker/**']
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and push Docker image
        run: |
          BUILD_ID=$(gcloud builds submit services/blog-worker \
            --tag asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/blog-worker/blog-worker:latest \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --async --format='value(id)')
          echo "Build started: $BUILD_ID"
          # Poll until complete
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status)')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update blog-pipeline \
            --image asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/blog-worker/blog-worker:latest \
            --region asia-northeast1 \
            --task-timeout 3600 \
            --memory 4Gi \
            --cpu 2 \
            --set-env-vars "SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --set-env-vars "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" \
            --set-env-vars "BRAVE_API_KEY=${{ secrets.BRAVE_API_KEY }}" \
            --set-env-vars "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" \
            --set-env-vars "SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}" \
            --set-env-vars "SLACK_DEFAULT_CHANNEL=${{ secrets.SLACK_DEFAULT_CHANNEL }}" \
            --set-env-vars "MLFLOW_TRACKING_URI=http://localhost:5000" \
            --project ${{ secrets.GCP_PROJECT_ID }}
