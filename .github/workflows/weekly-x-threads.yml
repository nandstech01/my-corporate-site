name: Weekly X & Threads

on:
  schedule:
    # 毎週日曜 12:00 JST (= UTC 03:00) — 週末キャッチアップ層に最適
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      type:
        description: 'claude-code / ai-news / both'
        required: true
        type: choice
        options:
          - both
          - claude-code
          - ai-news
      platform:
        description: 'x / threads / both'
        required: true
        type: choice
        options:
          - both
          - x
          - threads

permissions:
  contents: read

jobs:
  post-to-x:
    name: 🐦 X Weekly Thread
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.platform != 'threads' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📰 Research & Post to X
        run: npx tsx scripts/weekly-claude-code-update.ts
        env:
          WEEKLY_POST_TYPE: ${{ github.event.inputs.type || 'both' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

  post-to-threads:
    name: 🧵 Threads Weekly Thread
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.platform != 'x' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📰 Research & Post to Threads
        run: npx tsx scripts/weekly-threads-update.ts
        env:
          WEEKLY_POST_TYPE: ${{ github.event.inputs.type || 'both' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_POSTING_ENABLED: 'true'
