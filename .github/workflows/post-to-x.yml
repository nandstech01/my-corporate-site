name: Post to X

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'article / research / quote / direct / cross-post'
        required: true
        type: choice
        options:
          - article
          - research
          - quote
          - direct
          - cross-post
      post_text:
        description: '直接投稿テキスト（directモード用）'
        required: false
        type: string
      quote_tweet_id:
        description: '引用元ツイートID（quoteモード用）'
        required: false
        type: string
      quote_text:
        description: '引用テキスト（quoteモード用）'
        required: false
        type: string
      slug:
        description: 'ブログ記事slug（articleモード用）'
        required: false
        type: string
      topic:
        description: '調査トピック（researchモード用）'
        required: false
        type: string
      url:
        description: '参照URL（researchモード用、任意）'
        required: false
        type: string
      platforms:
        description: 'Cross-post先プラットフォーム（cross-postモード用、カンマ区切り: zenn,qiita,note）'
        required: false
        type: string
        default: 'zenn,qiita,note'
      dry_run:
        description: '生成のみ（投稿しない）'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  post:
    name: 🐦 Generate & Post
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Generate & Post to X
        run: |
          if [ "${{ inputs.mode }}" = "cross-post" ]; then
            npx tsx scripts/cross-post.ts
          elif [ "${{ inputs.mode }}" = "quote" ]; then
            npx tsx scripts/quote-tweet-manual.ts
          elif [ "${{ inputs.mode }}" = "direct" ]; then
            npx tsx scripts/direct-post.ts
          else
            npx tsx scripts/post-to-x.ts
          fi
        env:
          QUOTE_TEXT: ${{ inputs.quote_text }}
          QUOTE_TWEET_ID: ${{ inputs.quote_tweet_id }}
          POST_TEXT: ${{ inputs.post_text }}
          MODE: ${{ inputs.mode }}
          SLUG: ${{ inputs.slug }}
          TOPIC: ${{ inputs.topic }}
          URL: ${{ inputs.url }}
          DRY_RUN: ${{ inputs.dry_run }}
          CROSS_POST_SLUG: ${{ inputs.slug }}
          CROSS_POST_PLATFORMS: ${{ inputs.platforms }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          NOTE_ACCESS_TOKEN: ${{ secrets.NOTE_ACCESS_TOKEN }}
