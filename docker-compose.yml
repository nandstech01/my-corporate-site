version: '3.8'

services:
  # Django RAG API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    networks:
      - rag_net
    depends_on:
      - grafana
      - mlflow
    # DNS設定を追加（IPv4優先）
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Grafana (可視化)
  grafana:
    image: grafana/grafana:10.4.2
    container_name: rag_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    networks:
      - rag_net
    # DNS設定を追加（IPv4優先）
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Blog Worker (ローカル開発用)
  blog-worker:
    build:
      context: ./services/blog-worker
      dockerfile: Dockerfile
    container_name: blog_worker
    ports:
      - "8001:8001"
    volumes:
      - ./services/blog-worker/blog_worker:/app/blog_worker
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    networks:
      - rag_net
    depends_on:
      - mlflow
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["serve", "--port", "8001"]

  # MLflow Tracking Server (Phase 4)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: rag_mlflow
    ports:
      - "5050:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - rag_net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  rag_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8:1::/64

volumes:
  grafana_data:
    driver: local
  mlflow_data:
    driver: local

